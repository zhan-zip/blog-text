<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">详情页</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
    <link rel="stylesheet" th:href="@{/css/typo.css}">
    <link rel="stylesheet" th:href="@{/css/me_define.css}">
    <!--引入editormd-->
    <link rel="stylesheet" th:href="@{/lib/editormd/css/editormd.min.css}">
    <!--引入animate动画-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <!--记得每个类名前都要加animate__，新版本就是这样-->
    <!--下面引入prism代码高亮库-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet">
    <!--下面引入tocbot目录工具-->
    <link rel="stylesheet" th:href="@{/lib/tocbot/tocbot.css}">

</head>
<body>

<!--后台导航-->
<nav th:fragment="menu(n)" class="ui inverted attached segment md-padded-tb-mini md-shadow-mini">
    <div class="ui container">
        <div class="ui inverted secondary stackable menu">
            <h1 class="ui teal header item">后台</h1>
            <a href="#" th:href="@{/admin/index}" class="item md-mobile-hide md-item" th:classappend="${n==1} ? 'active'"><i class="home icon"></i>首页</a>
            <a href="#" th:href="@{/admin/types}" class="item md-mobile-hide md-item" th:classappend="${n==2} ? 'active'"><i class="idea icon"></i>分类</a>
            <a href="#" th:href="@{/admin/blogs}" class="item md-mobile-hide md-item" th:classappend="${n==3} ? 'active'"><i class="clone icon"></i>归档</a>
            <a href="#" class="item md-mobile-hide md-item" th:classappend="${n==4} ? 'active'"><i class="tags icon"></i>标签</a>
            <a href="#" class="item md-mobile-hide md-item" th:classappend="${n==5} ? 'active'"><i class="info icon"></i>关于我</a>
            <div class="right item">
                <div class="item">
                    <div class="ui dropdown item">
                        <div class="text">
                            <img src="../../static/images/wechat.jpg" class="ui rounded image" th:src="@{/images/wechat.jpg}">
                            用户
                        </div>
                        <i class="dropdown icon"></i>
                        <div class="menu">
                            <a href="#" class="item" th:href="@{/admin/logout}">注销</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <a href="#" class="ui menu toggle inverted icon button md-right-top md-mobile-show">
        <i class="sidebar icon"></i>
    </a>
</nav>


<!--底部-->
<footer class="ui inverted vertical segment md-padded-tb-massive" th:fragment="footer">
    <div class="ui center aligned container">
        <div class="ui inverted divided stackable grid">
            <div class="three wide column">
                <img src="../static/images/wechat.jpg" class="ui rounded image" alt="" style="width:300px" th:src="@{/images/wechat.jpg}">
            </div>
            <div class="four wide column">
                <h2 class="ui inverted header">最新博客抢先看</h2>
                <div class="ui inverted link list">
                    <a href="#" class="item">我不知道</a>
                    <a href="#" class="item">写点啥</a>
                    <a href="#" class="item">先这样</a>
                    <a href="#" class="item">再见</a>
                    <a href="#" class="item">左边是我微信</a>
                </div>
            </div>
            <div class="four wide column">
                <h2 class="ui inverted header">最新博客抢先看</h2>
                <div class="ui inverted link list">
                    <a href="#" class="item">我不知道</a>
                    <a href="#" class="item">写点啥</a>
                    <a href="#" class="item">先这样</a>
                    <a href="#" class="item">再见</a>
                    <a href="#" class="item">左边是我微信</a>
                </div>
            </div>
            <div class="five wide column">
                <h2 class="ui inverted header">标题</h2>
                <p>字字字字字</p>
            </div>
        </div>
        <div class="ui inverted section divider">
            <p class="md-tt-lined md-tt-spaced md-tt-thin md-opacity-mini">其实这里应该放版权声明你知道吗</p>
        </div>
    </div>
</footer>

<th:block th:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6/dist/jquery.min.js"></script>
    <!--markdown-->
    <script th:src="@{/lib/editormd/editormd.min.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <!--下面引入tocbot目录工具-->
    <script th:src="@{/lib/tocbot/tocbot.min.js}"></script>
    <!--下面引入qrcode二维码生成-->
    <script th:src="@{/lib/qrcode/qrcode.min.js}"></script>
    <!--下面引入scrollto平滑滚动-->
    <script src="https://cdn.jsdelivr.net/npm/jquery.scrollto@2.1.3/jquery.scrollTo.min.js"></script>
</th:block>

</body>
</html>
