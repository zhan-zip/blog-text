<!DOCTYPE html>
<html lang="zh-CN">
<head th:replace="admin/_fragments :: head('后台')">
    <title>管理员神秘区域</title>
</head>
<body>
<!--导航-->
<nav class="ui inverted attached segment md-padded-tb-mini md-shadow-mini" th:replace="admin/_fragments :: menu(3)" ></nav>
    <!--二级导航-->
    <div class="ui attached md-pd-tb-mini menu">
        <div class="ui container">
            <a href="#" class="teal active item" th:href="@{/admin/blogs/input}">发布</a>
            <a href="#" class="item" th:href="@{/admin/blogs}">列表</a>
        </div>
    </div>

    <!--内容-->
    <div class="md-pd-tb-massive">
        <div class="ui container">
            <form action="#" method="post" class="ui form" th:action="@{/admin/blogs}" id="blog-form" th:object="${blog}">
                <input type="hidden" name="published">
                <input type="hidden" name="id" th:value="*{id}">
                <!--标题栏-->
                <div class="required field">
                    <input type="text" name="title" placeholder="标题" th:value="*{title}">
                </div>
                <!--内容-->
                <div style="background-color: rgba(255,255,255,0.9); border-radius: 12px; padding: 2.5em 2em; box-shadow: 0 8px 16px rgba(0,0,0,0.1);">
                    <div class="required field">
                        <div id="md-content" style="z-index: 1 !important;">
                            <textarea placeholder="输入内容" name="content" style="display: none;" th:text="*{content}">
[TOC]

#### Disabled options

- TeX (Based on KaTeX);
- Emoji;
- Task lists;
- HTML tags decode;
- Flowchart and Sequence Diagram;

                            </textarea>
                        </div>
                    </div>
                </div>
                <!--底部tag选择-->
                <div class="required field">

                        <div class="ui left labeled input">
                            <label class="ui action compact teal basic label">分类</label>
                            <div class="ui fluid selection dropdown">
                                <input type="hidden" name="type.id" th:value="*{type.id}">
                                <i class="dropdown icon"></i>
                                <div class="default text">分类</div>
                                <div class="menu">
                                    <div class="item" data-value="1" th:each="types : ${types}" th:data-value="${types.id}" th:text="${types.name}">开发者手册</div>
                                </div>
                            </div>
                        </div>
                </div>
                <div class="required field">
                    <div class="ui left labeled input">
                        <label class="ui teal basic label">首图</label>
                        <input type="text" name="firstPicture" placeholder="首图地址" th:value="*{firstPicture}">
                    </div>
                </div>
                <!--表单错误信息显示-->
                <div class="ui error message"></div>

                <!--保存返回-->
                <div class="ui right aligned container">
                    <button type="button" class="ui button" onclick="window.history.go(-1)">返回</button>
                    <button type="button" id="save-button" class="ui orange button">保存</button>
                    <button type="button" id="publish-button" class="ui teal button">发布</button>
                </div>
            </form>
        </div>
    </div>

<!--底部-->
<footer class="ui inverted vertical segment md-padded-tb-massive" th:replace="admin/_fragments :: footer">
</footer>

<th:block th:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6/dist/jquery.min.js"></script>
    <!--markdown-->
    <script th:src="@{/lib/editormd/editormd.min.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <!--下面引入tocbot目录工具-->
    <script th:src="@{/lib/tocbot/tocbot.min.js}"></script>
    <!--下面引入qrcode二维码生成-->
    <script th:src="@{/lib/qrcode/qrcode.min.js}"></script>
    <!--下面引入scrollto平滑滚动-->
    <script src="https://cdn.jsdelivr.net/npm/jquery.scrollto@2.1.3/jquery.scrollTo.min.js"></script>
</th:block>

<!--底下这串我看不懂，做互动的-->
    <script>
        /*初始化markdown*/
        var contentEditor;
            $(function() {
                contentEditor= editormd("md-content", {
                    width   : "100%",
                    height  : 640,
                    syncScrolling : "single",
                    path    : "/lib/editormd/lib/"
                });
            });

        /*做一个适应手机端的导航栏收缩按键*/
        $('.menu.toggle').click(function(){
            $('.md-item').toggleClass('md-mobile-hide');
        });

        /*头像下拉组件*/
        $('.ui.dropdown').dropdown();

        /*表单内容验证*/
        $('.ui.form').form({
            fields : {
                title : {
                    identifier:'title',
                    rules:[{
                        type : 'empty',
                        prompt:'请输入标题'
                    }]
                },
                content : {
                    identifier:'content',
                    rules:[{
                        type : 'empty',
                        prompt:'请输入内容'
                    }]
                },
                typeId : {
                    identifier:'type.id',
                    rules:[{
                        type : 'empty',
                        prompt:'请输入分类名称'
                    }]
                },
                firstPicture : {
                    identifier:'firstPicture',
                    rules:[{
                        type : 'empty',
                        prompt:'请输入首图地址'
                    }]
                }
            }
        });

        /*保存*/
        $('#save-button').click(function () {
            $('[name="published"]').val(false);
            $('#blog-form').submit();
        });

        /*发布*/
        $('#publish-button').click(function () {
            $('[name="published"]').val(true);
            $('#blog-form').submit();
        });

    </script>


</body>
</html>
