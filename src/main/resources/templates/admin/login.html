<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
    <link rel="stylesheet" th:href="@{/css/me_define.css}">
</head>
<body>
<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div style="background-color: rgba(255,255,255,0.9); border-radius: 12px; padding: 2.5em 2em; box-shadow: 0 8px 16px rgba(0,0,0,0.1);">
        <div class="ui container" style="max-width: 12em;">
            <h2 class="ui teal image header center aligned">
                <div class="content">登录</div>
            </h2>
            <form class="ui large form" th:action="@{/admin/login}" method="post">
                <div class="ui stacked segment" style="border: none; box-shadow: none; background: transparent;">
                    <div class="field">
                        <div class="ui left icon input">
                            <i class="user icon"></i>
                            <input type="text" name="username" placeholder="用户名">
                        </div>
                    </div>
                    <div class="field">
                        <div class="ui left icon input">
                            <i class="lock icon"></i>
                            <input type="password" name="password" placeholder="密码">
                        </div>
                    </div>
                    <button class="ui fluid large teal button" type="submit">登录</button>
                </div>
                <div class="ui error message" th:if="${message}" th:text="${message}"></div>

                <div class="ui error mini message">

                </div>

                <div class="ui mini message" th:unless="${#strings.isEmpty(message)}" th:text="${message}"></div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.js"></script>
<script>
    $('.ui.form').form({
        fields: {
            username: 'empty',
            password: 'empty',
        }
    });
</script>
</body>
</html>
